<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brithany ✿ mi agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --pink0:#fff0f5;--pink1:#ffd6e7;--pink2:#ffb3d1;--pink3:#f472b6;
    --lilac:#f3e8ff;--lilac2:#c084fc;--lilac3:#7c3aed;
    --cream:#fff8fb;--border:#f9a8d4;
    --txt:#6b2152;--txt2:#9d3f6f;--txt3:#c06090;
  }
  body{font-family:'Nunito',sans-serif;background:var(--pink0);color:var(--txt);min-height:100vh;padding:1.5rem 1rem}
  .app{max-width:860px;margin:0 auto}
  .header-banner{background:var(--pink1);border:1.5px solid var(--border);border-radius:20px;padding:14px 20px;display:flex;align-items:center;gap:16px;margin-bottom:1.2rem;position:relative;overflow:hidden}
  .header-banner::before{content:'✿';position:absolute;right:20px;top:8px;font-size:28px;opacity:0.3}
  .header-banner::after{content:'✿';position:absolute;right:50px;bottom:6px;font-size:18px;opacity:0.2}
  .banner-text h1{font-size:20px;font-weight:700;color:var(--txt);margin-bottom:2px}
  .banner-text p{font-size:12px;color:var(--txt2)}
  .tabs{display:flex;gap:6px;margin-bottom:1.2rem;flex-wrap:wrap}
  .tab{padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);border-radius:50px;background:var(--cream);color:var(--txt2);font-family:'Nunito',sans-serif;transition:all 0.15s}
  .tab.active{background:var(--pink3);color:#fff;border-color:var(--pink3)}
  .tab:hover:not(.active){background:var(--pink1)}
  .section{display:none}.section.active{display:block}
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;background:var(--lilac);border-radius:16px;padding:10px 16px;border:1.5px solid #e9d5ff}
  .cal-header h2{font-size:16px;font-weight:700;color:var(--lilac3)}
  .nav-btn{background:var(--pink0);border:1.5px solid var(--border);border-radius:50px;padding:5px 14px;cursor:pointer;color:var(--txt2);font-size:13px;font-family:'Nunito',sans-serif;font-weight:700}
  .nav-btn:hover{background:var(--pink1)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-day-label{text-align:center;font-size:11px;color:var(--txt3);padding:4px 0;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
  .cal-cell{min-height:66px;background:var(--cream);border:1.5px solid var(--pink1);border-radius:12px;padding:5px;cursor:pointer;transition:all 0.15s}
  .cal-cell:hover{background:var(--pink1);border-color:var(--pink3)}
  .cal-cell.other-month{opacity:0.3}
  .cal-cell.today{background:var(--lilac);border-color:var(--lilac2)}
  .cal-cell.today .day-num{background:var(--lilac3);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
  .day-num{font-size:12px;font-weight:700;margin-bottom:3px;color:var(--txt2);width:20px;height:20px;display:flex;align-items:center;justify-content:center}
  .event-dot{font-size:10px;background:var(--pink2);color:var(--txt);border-radius:6px;padding:1px 4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;font-weight:700}
  .todo-list{display:flex;flex-direction:column;gap:8px}
  .todo-item{display:flex;align-items:center;gap:10px;background:var(--cream);border:1.5px solid var(--pink1);border-radius:14px;padding:10px 14px;transition:border 0.15s}
  .todo-item:hover{border-color:var(--pink3)}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--txt3)}
  .todo-check{width:17px;height:17px;cursor:pointer;accent-color:var(--pink3);flex-shrink:0}
  .todo-text{font-size:13px;flex:1;color:var(--txt);font-family:'Nunito',sans-serif}
  .cat-tag{font-size:10px;padding:2px 8px;border-radius:50px;font-weight:700;font-family:'Nunito',sans-serif}
  .cat-personal{background:var(--pink1);color:var(--txt2)}
  .cat-salud{background:#d1fae5;color:#065f46}
  .cat-hogar{background:#fef3c7;color:#78350f}
  .cat-otro{background:var(--lilac);color:var(--lilac3)}
  .todo-del{background:transparent;border:none;cursor:pointer;color:var(--txt3);font-size:15px;padding:0 4px;font-family:'Nunito',sans-serif}
  .add-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
  .add-row input,.add-row select{padding:8px 12px;border:1.5px solid var(--border);border-radius:50px;font-size:13px;background:var(--cream);color:var(--txt);font-family:'Nunito',sans-serif;outline:none}
  .add-row input{flex:1;min-width:140px}
  .add-row input:focus,.add-row select:focus{border-color:var(--pink3)}
  .add-btn{padding:8px 18px;border:1.5px solid var(--pink3);border-radius:50px;cursor:pointer;font-size:13px;font-weight:700;background:var(--pink3);color:#fff;font-family:'Nunito',sans-serif}
  .add-btn:hover{background:#ec4899}
  .filter-row{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
  .filter-btn{padding:5px 14px;border:1.5px solid var(--border);border-radius:50px;font-size:12px;cursor:pointer;background:transparent;color:var(--txt2);font-family:'Nunito',sans-serif;font-weight:700}
  .filter-btn.active{background:var(--pink2);color:var(--txt);border-color:var(--pink3)}
  .modal-overlay{display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;background:rgba(180,60,120,0.18)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--cream);border-radius:20px;border:2px solid var(--border);padding:1.5rem;width:340px;max-width:95vw;position:relative}
  .modal::before{content:'✿ ✿';position:absolute;top:10px;right:14px;font-size:14px;opacity:0.4;letter-spacing:4px}
  .modal h3{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:1rem}
  .modal label{font-size:12px;color:var(--txt2);display:block;margin-bottom:3px;margin-top:10px;font-weight:700}
  .modal input,.modal textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;background:#fff;color:var(--txt);font-family:'Nunito',sans-serif;outline:none}
  .modal input:focus,.modal textarea:focus{border-color:var(--pink3)}
  .modal textarea{height:68px;resize:none}
  .modal-footer{display:flex;gap:8px;margin-top:1.2rem;justify-content:flex-end}
  .modal-footer button{padding:8px 18px;border:1.5px solid var(--border);border-radius:50px;cursor:pointer;font-size:13px;font-weight:700;background:var(--cream);color:var(--txt2);font-family:'Nunito',sans-serif}
  .modal-footer .btn-ok{background:var(--pink3);color:#fff;border-color:var(--pink3)}
  .modal-footer .btn-ok:hover{background:#ec4899}
  .event-card{background:var(--cream);border:1.5px solid var(--pink1);border-radius:16px;padding:12px 14px;margin-bottom:8px;transition:border 0.15s}
  .event-card:hover{border-color:var(--pink3)}
  .ev-title{font-size:13px;font-weight:700;color:var(--txt)}
  .ev-meta{font-size:11px;color:var(--txt3);margin-top:3px}
  .ev-note{font-size:12px;color:var(--txt2);margin-top:5px;font-style:italic}
  .ev-del{float:right;background:transparent;border:none;cursor:pointer;color:var(--txt3);font-size:15px;font-family:'Nunito',sans-serif}
  .empty-state{text-align:center;padding:2rem;color:var(--txt3);font-size:13px}
  .deco-strip{display:flex;justify-content:center;gap:10px;font-size:18px;margin-bottom:0.8rem;opacity:0.55;letter-spacing:6px}
</style>
</head>

<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const today=new Date();
let cur={y:today.getFullYear(),m:today.getMonth()};
let events={};
let todos=[];
let selectedDate=null;
let todoFilter='all';

try{
  events=JSON.parse(localStorage.getItem('kg_events')||'{}');
  todos=JSON.parse(localStorage.getItem('kg_todos')||'[]');
}catch(e){}

function save(){
  try{
    localStorage.setItem('kg_events',JSON.stringify(events));
    localStorage.setItem('kg_todos',JSON.stringify(todos));
  }catch(e){}
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',['cal','todos','events'][i]===t);
  });
  ['cal','todos','events'].forEach(s=>{
    document.getElementById('sec-'+s).classList.toggle('active',s===t);
  });
  if(t==='events') renderEvents();
}

function changeMonth(d){
  cur.m+=d;
  if(cur.m>11){cur.m=0;cur.y++;}
  if(cur.m<0){cur.m=11;cur.y--;}
  renderCal();
}

function renderCal(){
  const g=document.getElementById('cal-grid');
  document.getElementById('cal-title').textContent='✿ '+MONTHS[cur.m]+' '+cur.y+' ✿';
  const first=new Date(cur.y,cur.m,1).getDay();
  const days=new Date(cur.y,cur.m+1,0).getDate();
  let html=DAYS.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const prevDays=new Date(cur.y,cur.m,0).getDate();
  for(let i=first-1;i>=0;i--){
    html+=`<div class="cal-cell other-month"><div class="day-num">${prevDays-i}</div></div>`;
  }
  for(let d=1;d<=days;d++){
    const key=`${cur.y}-${String(cur.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=cur.y===today.getFullYear()&&cur.m===today.getMonth()&&d===today.getDate();
    const evs=events[key]||[];
    const dots=evs.slice(0,2).map(e=>`<div class="event-dot">✦ ${e.name}</div>`).join('');
    html+=`<div class="cal-cell${isToday?' today':''}" onclick="openModal('${key}')">
      <div class="day-num">${d}</div>${dots}
    </div>`;
  }
  g.innerHTML=html;
}

function openModal(key){
  selectedDate=key;
  const[y,m,d]=key.split('-');
  document.getElementById('modal-date-title').textContent='✿ '+parseInt(d)+' de '+MONTHS[parseInt(m)-1]+' '+y;
  document.getElementById('ev-name').value='';
  document.getElementById('ev-time').value='';
  document.getElementById('ev-note').value='';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
}

function saveEvent(){
  const name=document.getElementById('ev-name').value.trim();
  if(!name) return;
  const time=document.getElementById('ev-time').value;
  const note=document.getElementById('ev-note').value.trim();
  if(!events[selectedDate]) events[selectedDate]=[];
  events[selectedDate].push({name,time,note});
  save(); closeModal(); renderCal();
}

function addTodo(){
  const txt=document.getElementById('todo-input').value.trim();
  if(!txt) return;
  const cat=document.getElementById('todo-cat').value;
  todos.push({id:Date.now(),text:txt,cat,done:false});
  document.getElementById('todo-input').value='';
  save(); renderTodos();
}

function toggleTodo(id){
  const t=todos.find(x=>x.id===id);
  if(t) t.done=!t.done;
  save(); renderTodos();
}

function delTodo(id){
  todos=todos.filter(x=>x.id!==id);
  save(); renderTodos();
}

function filterTodo(f,btn){
  todoFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTodos();
}

function renderTodos(){
  const list=document.getElementById('todo-list');
  let filtered=todos;
  if(todoFilter==='done') filtered=todos.filter(t=>t.done);
  else if(todoFilter==='pendiente') filtered=todos.filter(t=>!t.done);
  if(!filtered.length){
    list.innerHTML='<div class="empty-state">✿ Nada aquí todavía ✿</div>';
    return;
  }
  list.innerHTML=filtered.map(t=>`
    <div class="todo-item${t.done?' done':''}">
      <input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleTodo(${t.id})" />
      <span class="todo-text">${t.text}</span>
      <span class="cat-tag cat-${t.cat}">${t.cat}</span>
      <button class="todo-del" onclick="delTodo(${t.id})">✕</button>
    </div>`).join('');
}

function renderEvents(){
  const list=document.getElementById('events-list');
  const all=Object.entries(events).flatMap(([k,evs])=>evs.map(e=>({...e,date:k})));
  all.sort((a,b)=>a.date.localeCompare(b.date));
  if(!all.length){
    list.innerHTML='<div class="empty-state">✿ Aún no tienes planes agendados ✿</div>';
    return;
  }
  list.innerHTML=all.map(e=>{
    const[y,m,d]=e.date.split('-');
    return `<div class="event-card">
      <button class="ev-del" onclick="delEvent('${e.date}','${e.name}')">✕</button>
      <div class="ev-title">✦ ${e.name}</div>
      <div class="ev-meta">${parseInt(d)} de ${MONTHS[parseInt(m)-1]} ${y}${e.time?' · '+e.time:''}</div>
      ${e.note?`<div class="ev-note">${e.note}</div>`:''}
    </div>`;
  }).join('');
}

function delEvent(date,name){
  if(events[date]) events[date]=events[date].filter(e=>e.name!==name);
  save(); renderEvents(); renderCal();
}

renderCal();
renderTodos();
checkNotifications();

function checkNotifications(){
  if(!("Notification" in window)) return;

  function doCheck(){
    const now = new Date();
    const todayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate()+1);
    const tomorrowKey = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth()+1).padStart(2,'0')}-${String(tomorrow.getDate()).padStart(2,'0')}`;

    const todayEvs = events[todayKey] || [];
    const tomorrowEvs = events[tomorrowKey] || [];
    const pendingTodos = todos.filter(t => !t.done);

    if(todayEvs.length > 0){
      todayEvs.forEach(e => {
        const title = '✿ Brithany — hoy tienes un plan!';
        const body = `${e.name}${e.time ? ' a las ' + e.time : ''}${e.note ? '\n' + e.note : ''}`;
        new Notification(title, { body, icon: '' });
      });
    }

    if(tomorrowEvs.length > 0){
      tomorrowEvs.forEach(e => {
        const title = '❀ Brithany — mañana tienes un plan!';
        const body = `${e.name}${e.time ? ' a las ' + e.time : ''}`;
        new Notification(title, { body, icon: '' });
      });
    }

    if(pendingTodos.length > 0){
      new Notification('✦ Brithany — tareas pendientes', {
        body: `Tienes ${pendingTodos.length} tarea${pendingTodos.length > 1 ? 's' : ''} pendiente${pendingTodos.length > 1 ? 's' : ''}: ${pendingTodos.slice(0,2).map(t=>t.text).join(', ')}${pendingTodos.length > 2 ? '...' : ''}`,
        icon: ''
      });
    }
  }

  if(Notification.permission === 'granted'){
    doCheck();
    setInterval(doCheck, 60 * 60 * 1000);
  } else if(Notification.permission !== 'denied'){
    Notification.requestPermission().then(p => {
      if(p === 'granted'){
        doCheck();
        setInterval(doCheck, 60 * 60 * 1000);
      }
    });
  }
}
</script>
